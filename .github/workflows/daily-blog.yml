name: Daily Blog Post

on:
  schedule:
    # 매일 한국시간 오전 9시 (UTC 0시)
    - cron: '0 0 * * *'
  workflow_dispatch: # 수동 실행 가능

permissions:
  contents: write

jobs:
  generate-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install @anthropic-ai/sdk

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-post.mjs

      - name: Check for new files
        id: check
        run: |
          if [ -n "$(git status --porcelain src/content/blog/)" ]; then
            echo "has_new=true" >> $GITHUB_OUTPUT
          else
            echo "has_new=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.has_new == 'true'
        run: |
          git config user.name "hesed-dynasty-bot"
          git config user.email "hesed@hesedhouse.net"
          NEW_FILE=$(git status --porcelain src/content/blog/ | head -1 | awk '{print $2}')
          TITLE=$(grep '^title:' "$NEW_FILE" | sed 's/title: "//;s/"//')
          git add src/content/blog/
          git commit -m "blog: ${TITLE}

          Auto-generated by Hesed Dynasty Blog Bot 🏯"
          git push
